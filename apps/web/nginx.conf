server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Aggressive caching for built assets
    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API requests proxied to the api container on the docker network
    location /api/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow larger uploads (invoices, signatures, decommission certs)
        client_max_body_size 32M;
        proxy_read_timeout   120s;
        proxy_send_timeout   120s;
    }

    # SPA fallback — every non-asset, non-API path returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health endpoint
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
