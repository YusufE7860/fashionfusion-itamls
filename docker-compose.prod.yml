services:
  postgres:
    image: postgres:16-alpine
    container_name: itamls_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:latest
    container_name: itamls_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"   # admin console only — bucket access is internal

  redis:
    image: redis:7-alpine
    container_name: itamls_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: itamls_api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      minio:    { condition: service_started }
      redis:    { condition: service_started }
    environment:
      DATABASE_URL:       "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
      JWT_SECRET:         ${JWT_SECRET}
      JWT_EXPIRES_IN:     "1d"
      PORT:               "4000"
      CORS_ORIGIN:        ${WEB_BASE_URL}
      WEB_BASE_URL:       ${WEB_BASE_URL}
      MINIO_ENDPOINT:     "minio"
      MINIO_PORT:         "9000"
      MINIO_USE_SSL:      "false"
      MINIO_ACCESS_KEY:   ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY:   ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET:       "itamls-invoices"
      TOTP_ISSUER:        ${TOTP_ISSUER}
      HELPDESK_SYSTEM:    ${HELPDESK_SYSTEM:-STUB}
      PRICE_LOOKUP_PROVIDER: ${PRICE_LOOKUP_PROVIDER:-SEARCH_LINKS}
      SMTP_HOST:          ${SMTP_HOST:-}
      SMTP_PORT:          ${SMTP_PORT:-587}
      SMTP_SECURE:        ${SMTP_SECURE:-false}
      SMTP_USER:          ${SMTP_USER:-}
      SMTP_PASS:          ${SMTP_PASS:-}
      SMTP_FROM:          ${SMTP_FROM:-ITAMLS <no-reply@fashionfusion.local>}
      # In-app self-updater — where the repo lives on the host + inside the container
      REPO_DIR:           "/repo"
      HOST_REPO_PATH:     ${HOST_REPO_PATH:-/opt/itamls}
    volumes:
      # Live repo for the self-updater to git-pull and compare commits
      - ${HOST_REPO_PATH:-/opt/itamls}:/repo
      # Docker socket so the API can spawn the detached updater container
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: itamls_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  postgres_data:
  minio_data:
  redis_data:
